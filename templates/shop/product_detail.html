{% extends 'base.html' %}

{% block title %}{{ product.name }} - DevGear{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row align-items-center">

        <!-- Image -->
        <div class="col-md-6 mb-4">
            <div class="product-image-box">
                <img src="{{ product.image }}" class="img-fluid rounded">
            </div>
        </div>

        <!-- Details -->
        <div class="col-md-6">

            <h2 class="fw-bold mb-3">{{ product.name }}</h2>

            <p class="text-muted">
                {{ product.description }}
            </p>

            <h3 class="text-dark fw-bold mt-3 mb-4">
                ${{ product.price }}
            </h3>

            <div class="d-flex gap-3">

                <a href="/add-to-cart/{{ product.id }}/"
                   class="btn btn-dark px-4 py-2">
                    🛒 Add to Cart
                </a>

                <a href="/" class="btn btn-outline-secondary px-4 py-2">
                    Back
                </a>

            </div>

        </div>

    </div>

</div>

<style>

.product-image-box {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.product-image-box img {
    max-height: 350px;
    object-fit: contain;
}

/* Hover effect */
.btn-dark:hover {
    background-color: #000;
}

</style>

{% endblock %}
