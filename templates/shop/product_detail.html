{% extends 'base.html' %}

{% block title %}{{ product.name }} - DevGear{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row g-5 align-items-center">

        <div class="col-lg-6">
            <div class="product-image-box">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-image">
                {% else %}
                    <div class="no-image-box">
                        No Image Available
                    </div>
                {% endif %}
            </div>
        </div>

        <div class="col-lg-6">
            <div class="product-details-card">
                <h1 class="fw-bold mb-3 text-light">{{ product.name }}</h1>

                <p class="product-description">
                    {{ product.description }}
                </p>

                <h2 class="fw-bold mb-4 product-price">
                    ${{ product.price }}
                </h2>

                <div class="d-flex gap-3 flex-wrap">
                    <a href="/add-to-cart/{{ product.id }}/" class="btn btn-info px-4 py-2 fw-semibold text-white">
                        🛒 Add to Cart
                    </a>
                    <a href="/" class="btn btn-outline-light px-4 py-2">
                        Back
                    </a>
                </div>
            </div>
        </div>

    </div>
</div>

<style>
    .product-image-box {
        background: #0f172a;
        border: 1px solid #1e293b;
        border-radius: 20px;
        padding: 20px;
        min-height: 460px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .product-image {
        width: 100%;
        max-height: 420px;
        object-fit: contain;
        border-radius: 16px;
        display: block;
    }

    .no-image-box {
        width: 100%;
        height: 420px;
        background: #111827;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        font-size: 18px;
        font-weight: 500;
    }

    .product-details-card {
        background: transparent;
    }

    .product-description {
        color: #94a3b8;
        font-size: 18px;
        line-height: 1.8;
        margin-bottom: 24px;
    }

    .product-price {
        color: #38bdf8;
    }

    .btn-info:hover {
        background-color: #0ea5e9;
        color: #fff;
    }
</style>
{% endblock %}
