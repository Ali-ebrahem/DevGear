{% extends 'base.html' %}

{% block title %}Logged Out - DevGear{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
        <div style="width: 100%; max-width: 420px; background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 36px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);">

            <div style="width: 72px; height: 72px; margin: 0 auto 20px; border-radius: 50%; background: rgba(56, 189, 248, 0.12); display: flex; align-items: center; justify-content: center; font-size: 30px;">
                👋
            </div>

            <h2 class="fw-bold text-light mb-2">Logged Out</h2>

            <p style="color:#94a3b8; font-size: 15px; line-height: 1.8; margin-bottom: 28px;">
                You have been logged out successfully. Thanks for visiting DevGear.
            </p>

            <div class="d-grid gap-3">
                <a href="{% url 'login' %}"
                   class="btn btn-info fw-semibold py-2">
                    Login Again
                </a>

                <a href="/"
                   class="btn btn-outline-light py-2">
                    Back to Home
                </a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
