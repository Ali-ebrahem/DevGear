{% extends 'base.html' %}

{% block title %}Login - DevGear{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 450px;">

    <div style="background:#0f172a; border:1px solid #1e293b; border-radius:18px; padding:30px;">

        <h2 class="text-center mb-4 text-light fw-bold">Welcome Back</h2>

        {% if form.errors %}
            <div class="alert alert-danger text-center">
                Invalid username or password
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label text-light">Username</label>
                <input type="text"
                       name="username"
                       class="form-control"
                       placeholder="Enter your username"
                       required>
            </div>

            <div class="mb-4">
                <label class="form-label text-light">Password</label>
                <input type="password"
                       name="password"
                       class="form-control"
                       placeholder="Enter your password"
                       required>
            </div>

            <button type="submit" class="btn btn-info w-100 fw-semibold">
                Login
            </button>
        </form>

        <p class="mt-4 text-center text-secondary">
            Don't have an account?
            <a href="/register/" style="color:#38bdf8;">Register</a>
        </p>

    </div>

</div>
{% endblock %}
